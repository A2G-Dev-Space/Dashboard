# ============================================
# AI Services Dashboard - Docker Compose
# ============================================
# Blue-Green 무중단 배포 지원
# 배포: ./deploy.sh (권장)
# 수동: docker compose up -d api-blue dashboard-blue

# 타임존 설정 (KST)
x-timezone: &timezone
  TZ: Asia/Seoul

# 사내 네트워크 프록시 설정
x-proxy-env: &proxy-env
  <<: *timezone
  HTTP_PROXY: "${HTTP_PROXY:-}"
  HTTPS_PROXY: "${HTTPS_PROXY:-}"
  NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api-blue,api-green,dashboard-blue,dashboard-green,nginx}"
  http_proxy: "${HTTP_PROXY:-}"
  https_proxy: "${HTTPS_PROXY:-}"
  no_proxy: "${NO_PROXY:-localhost,127.0.0.1,.samsungds.net,postgres,redis,api-blue,api-green,dashboard-blue,dashboard-green,nginx}"
  NODE_TLS_REJECT_UNAUTHORIZED: "${NODE_TLS_REJECT_UNAUTHORIZED:-0}"

# API 공통 설정
x-api-common: &api-common
  build:
    context: ./packages/api
    dockerfile: Dockerfile
    args:
      <<: *proxy-env
  restart: unless-stopped
  environment:
    <<: *proxy-env
    NODE_ENV: production
    DATABASE_URL: postgresql://${POSTGRES_USER:-nexuscoder}:${POSTGRES_PASSWORD:-nexuscoder123}@postgres:5432/${POSTGRES_DB:-nexuscoder}?connection_limit=100&pool_timeout=30
    REDIS_URL: redis://redis:6379
    JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
    SSO_CERT_PATH: /app/cert/cert.cer
    DEVELOPERS: ${DEVELOPERS:-syngha.han}
    PORT: ${API_PORT:-3000}
    DEFAULT_SERVICE_ID: ${DEFAULT_SERVICE_ID:-nexus-coder}
    DEFAULT_SERVICE_NAME: ${DEFAULT_SERVICE_NAME:-nexus-coder}
    DEFAULT_SERVICE_DISPLAY_NAME: ${DEFAULT_SERVICE_DISPLAY_NAME:-Nexus Coder}
  volumes:
    - ./cert:/app/cert:ro
  expose:
    - "3000"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
    interval: 10s
    timeout: 3s
    start_period: 30s
    retries: 3

# Dashboard 공통 설정
x-dashboard-common: &dashboard-common
  build:
    context: ./packages/dashboard
    dockerfile: Dockerfile
    args:
      <<: *proxy-env
  restart: unless-stopped
  environment:
    <<: *proxy-env
    VITE_API_URL: /api
  expose:
    - "80"

services:
  # ============================================
  # Base Services (항상 실행)
  # ============================================

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dashboard-db
    restart: unless-stopped
    command: postgres -c max_connections=1000 -c shared_buffers=512MB -c work_mem=8MB -c effective_cache_size=1536MB
    environment:
      <<: *timezone
      POSTGRES_DB: ${POSTGRES_DB:-nexuscoder}
      POSTGRES_USER: ${POSTGRES_USER:-nexuscoder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexuscoder123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-4091}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexuscoder} -d ${POSTGRES_DB:-nexuscoder}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dashboard-redis
    restart: unless-stopped
    environment:
      <<: *timezone
    command: redis-server --appendonly yes --maxclients 10000
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-4092}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Blue-Green: API Server
  # ============================================
  api-blue:
    <<: *api-common
    container_name: dashboard-api-blue

  api-green:
    <<: *api-common
    container_name: dashboard-api-green

  # ============================================
  # Blue-Green: React Dashboard
  # ============================================
  dashboard-blue:
    <<: *dashboard-common
    container_name: dashboard-frontend-blue

  dashboard-green:
    <<: *dashboard-common
    container_name: dashboard-frontend-green

  # Nginx Reverse Proxy (upstream은 deploy.sh가 동적 전환)
  nginx:
    image: nginx:alpine
    container_name: dashboard-proxy
    restart: unless-stopped
    environment:
      <<: *timezone
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
      - ./docs-site/dist:/var/www/docs:ro
    ports:
      - "${PROXY_PORT:-4090}:4090"
    depends_on:
      api-blue:
        condition: service_healthy
      api-green:
        condition: service_healthy
      dashboard-blue:
        condition: service_started
      dashboard-green:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
